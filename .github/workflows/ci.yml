name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so stale builds don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin to the same Xcode the project is developed against, which is the
  # macos-26 image's default. Explicit so CI stays deterministic if the
  # image's default later changes.
  XCODE_VERSION: "26.5"

jobs:
  lint:
    name: Lint & format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: SwiftLint
        # Pinned to an exact version so CI and local installs agree (an
        # unpinned install follows the rolling latest, so a new SwiftLint
        # release could turn CI red on untouched code). Bump deliberately.
        env:
          SWIFTLINT_VERSION: 0.65.0
        run: |
          curl -sSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -o -q swiftlint.zip -d swiftlint-bin
          ./swiftlint-bin/swiftlint version | grep -qx "${SWIFTLINT_VERSION}" \
            || { echo "SwiftLint version mismatch"; exit 1; }
          ./swiftlint-bin/swiftlint lint --strict
      - name: swift-format
        run: |
          swift format lint --strict --recursive --configuration .swift-format \
            Packages/SkidCore/Sources Packages/SkidCore/Tests Sources

  test:
    name: Test core logic
    runs-on: macos-26
    permissions:
      contents: read
      # Codecov uploads authenticate via GitHub OIDC — no upload token to
      # provision or rotate (public repo + Codecov GitHub App).
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/SkidCore/.build
          key: spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Packages/SkidCore/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-
      - name: Run logic tests with coverage
        working-directory: Packages/SkidCore
        run: swift test --enable-code-coverage
      - name: Export coverage report
        working-directory: Packages/SkidCore
        run: |
          PROF=$(find .build -name '*.profdata' | head -1)
          BIN=$(find .build -name 'SkidCorePackageTests.xctest' -type d | head -1)/Contents/MacOS/SkidCorePackageTests
          # Exclude build artifacts, tests, and the SwiftUI view layer
          # (SkidKit needs UI automation to exercise) so the figure
          # reflects the unit-tested logic.
          xcrun llvm-cov export "$BIN" -instr-profile "$PROF" -format=lcov \
            -ignore-filename-regex='(\.build|Tests)/|SkidKit/' \
            > coverage.lcov
          # Rewrite absolute SF: paths to repo-relative so Codecov maps files
          # correctly. The job runs on macOS, so this is BSD sed.
          sed -i '' -E 's#^SF:.*/(Packages/SkidCore/)#SF:\1#' coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: Packages/SkidCore/coverage.lcov
          use_oidc: true
          fail_ci_if_error: false

  build:
    name: Build app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/SkidCore/.build
          key: spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Packages/SkidCore/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ env.XCODE_VERSION }}-
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build iOS (simulator)
        run: |
          xcodebuild build \
            -project Skid.xcodeproj \
            -scheme Skid-iOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
