name: Skid

options:
  bundleIdPrefix: fi.misaki
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  SkidCore:
    path: Packages/SkidCore

targets:
  Skid-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/iOS
      - path: Sources/Shared
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Skid
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # No encryption → declare it so every TestFlight/App Store upload skips
        # the export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.racing
        # System-default launch screen (plain background) — the track fades in.
        UILaunchScreen: {}
        # All four orientations: a universal (iPhone + iPad) app must support
        # them for iPad multitasking, or App Store validation rejects the
        # build. The track letterboxes to fit whatever aspect it gets.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.skid
        # User-visible app/bundle name; without this it'd be the target name
        # "Skid-iOS".
        PRODUCT_NAME: Skid
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Team committed on purpose (it's not a secret): the release lane
        # archives headlessly with automatic signing, and the generated
        # project must carry the team for that to work.
        DEVELOPMENT_TEAM: U84DT7P75P
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SkidCore
        product: SkidKit
    # Explicit scheme so XcodeGen writes a SHARED scheme file — without it,
    # `xcodebuild -scheme Skid-iOS` fails on a fresh checkout.
    scheme:
      configVariants: []
